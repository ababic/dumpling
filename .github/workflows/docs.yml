# Build and deploy the mdBook site to GitHub Pages (main branch only).
# Pull-request verification runs in docs-pr.yml — this workflow does not run on PRs.
name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "book.toml"
      - "docs/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "0.4.52"

      - name: Build documentation site
        run: mdbook build

      - name: Upload Pages deployment artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy docs to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
